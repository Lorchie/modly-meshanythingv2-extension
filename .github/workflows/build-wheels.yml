name: Build mesh2sdf wheels

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

jobs:
  build:
    name: ${{ matrix.os }} · py${{ matrix.python }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows — Python 3.10
          - os: windows-latest
            python: "3.10"

          # Windows — Python 3.11
          - os: windows-latest
            python: "3.11"

          # Windows — Python 3.12
          - os: windows-latest
            python: "3.12"

          # Linux — Python 3.10
          - os: ubuntu-22.04
            python: "3.10"

          # Linux — Python 3.11
          - os: ubuntu-22.04
            python: "3.11"

          # Linux — Python 3.12
          - os: ubuntu-22.04
            python: "3.12"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      # ── MSVC (Windows only) ───────────────────────────────────────────────────

      - name: Activate MSVC (Windows only)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Remove Git link.exe (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: rm "/c/Program Files/Git/usr/bin/link.exe"

      # ── Build ─────────────────────────────────────────────────────────────────

      - name: Install build tools
        shell: bash
        run: pip install setuptools wheel ninja cmake "pybind11[global]"

      - name: Create output directory
        shell: bash
        run: mkdir -p wheel-out

      - name: Try pre-built mesh2sdf from PyPI
        id: pypi
        continue-on-error: true
        shell: bash
        run: |
          pip download mesh2sdf --only-binary :all: --dest ./wheel-out
          echo "found=true" >> $GITHUB_OUTPUT

      - name: Clone mesh2sdf
        if: steps.pypi.outputs.found != 'true'
        shell: bash
        run: git clone --depth=1 https://github.com/wang-ps/mesh2sdf.git mesh2sdf-src

      - name: Build mesh2sdf wheel
        if: steps.pypi.outputs.found != 'true'
        shell: bash
        run: |
          cd mesh2sdf-src
          pip wheel --no-deps --no-build-isolation -w ../wheel-out .

      - name: Rename wheel with python version suffix
        shell: python
        run: |
          import glob, os, platform, sys
          wheels = glob.glob("wheel-out/mesh2sdf*.whl")
          if not wheels:
              sys.exit("No mesh2sdf wheel found in wheel-out/")
          src = wheels[0]
          parts = os.path.basename(src)[:-4].split("-")
          py_tag  = parts[2] if len(parts) >= 5 else "cp311"
          abi_tag = parts[3] if len(parts) >= 5 else "cp311"
          plat    = "win_amd64" if platform.system() == "Windows" else "linux_x86_64"
          dst_name = f"mesh2sdf-{py_tag}-{abi_tag}-{plat}.whl"
          dst = os.path.join("wheel-out", dst_name)
          if os.path.abspath(src) != os.path.abspath(dst):
              os.rename(src, dst)
          print(f"Renamed to: {dst_name}")

      - uses: actions/upload-artifact@v4
        with:
          name: mesh2sdf-py${{ matrix.python }}-${{ matrix.os }}
          path: wheel-out/*.whl

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: wheels
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.version }}
          files: wheels/**/*.whl
          body: |
            Pre-compiled mesh2sdf wheels for MeshAnythingV2 extension.
            Naming: `mesh2sdf-{python}-{platform}.whl`
